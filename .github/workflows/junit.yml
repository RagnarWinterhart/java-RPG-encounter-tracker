name: junit
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'zulu'
          java-package: jdk
          architecture: x64
      - run: javac -g -cp "lib/junit.jar" -d out $(find src test -name "*.java")
      - run: java -jar lib/junit.jar execute --class-path out --scan-class-path
      - run: javadoc -d out -cp lib/junit.jar src/*.java

